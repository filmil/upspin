name: "Publish to my Bazel registry"

on:
  workflow_call:
    secrets:
      BCR_PUBLISH_TOKEN:
        required: false
        description: 'Optional token for BCR publishing.'
    inputs:
      tag_name:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to publish"
        required: true
        type: string

jobs:
  publish:
    uses: "bazel-contrib/publish-to-bcr/.github/workflows/publish.yaml@v0.2.2"
    with:
      tag_name: ${{ inputs.tag_name }}
      registry: filmil/bazel-registry
      registry_fork: filmil/bazel-registry
      attest: true
      draft: false
    permissions:
      contents: write
      id-token: write
      attestations: write
    secrets:
      publish_token: ${{ secrets.BCR_PUBLISH_TOKEN }}
